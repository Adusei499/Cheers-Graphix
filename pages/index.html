<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cheers Graphix - Creative Design Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/final.css" />
</head>

<body>
  <header class="header">
    <div class="brand-name">Cheers Graphix</div>
    <nav class="info-links">
      <a href="#about" class="nav-link">ABOUT</a>
      <a class="nav-link" href="/pages/servicepages.html">SERVICE</a>
      <a class="nav-link" href="/pages/portfoliopage.html">PORTFOLIO</a>
      <a class="nav-link" href="/pages/contactpage.html">CONTACT</a>
    </nav>
  </header>

  <main class="hero">
    <div class="overlay-text">
      <h1>Cheers<br>GRAPHIX</h1>
      <p>Crafting visually stunning designs that inspire and captivate minds</p>
      <div class="get-in-touch">
        <button class="get-in-touch-button">
          <a href="/pages/contactpage.html">GET IN TOUCH</a>
        </button>
      </div>
    </div>
    
    <div class="sliders">
      <div class="image-slider">
        <img class="slider-image active" src="https://images.unsplash.com/photo-1561070791-2526d30994b5?w=800&h=600&fit=crop" alt="Design 1">
        <img class="slider-image" src="https://images.unsplash.com/photo-1572044162444-ad60f128bdea?w=800&h=600&fit=crop" alt="Design 2">
        <img class="slider-image" src="https://images.unsplash.com/photo-1626785774573-4b799315345d?w=800&h=600&fit=crop" alt="Design 3">
        <img class="slider-image" src="https://images.unsplash.com/photo-1611224923853-80b023f02d71?w=800&h=600&fit=crop" alt="Design 4">
        <img class="slider-image" src="https://images.unsplash.com/photo-1634942537034-2531766767d1?w=800&h=600&fit=crop" alt="Design 5">
        
        <!-- Fallback overlay for when no images load -->
        <div class="placeholder-overlay">
          <div>
            <h3>Contact us for <br>Your Amazing Designs</h3>
          </div>
        </div>
      
        <div class="slider-dots">
          <span class="dot active" data-slide="0"></span>
          <span class="dot" data-slide="1"></span>
          <span class="dot" data-slide="2"></span>
          <span class="dot" data-slide="3"></span>
          <span class="dot" data-slide="4"></span>
        </div>
      </div>
    </div>
  </main>

  <footer id="main-footer">
    <div class="footer-content">
      <p>© 2025 Cheers Graphix. All rights reserved</p>
    </div>
    
    <nav class="footer-links">
      <a class="nav-link" href="#about">About</a>
      <a class="nav-link" href="/pages/servicepages.html">Services</a>
      <a class="nav-link" href="/pages/portfoliopage.html">Portfolio</a>
      <a class="nav-link" href="/pages/contactpage.html">Contact</a>
    </nav>
  </footer>

  <script src="/scripts/final.js"> 
  </script>
</body>
</html>
